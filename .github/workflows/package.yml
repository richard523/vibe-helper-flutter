name: Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions: write-all

jobs:
  deb-package:
    name: Build Debian Package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake git libgtk-3-dev liblzma-dev libstdc++-12-dev dpkg-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build directory
        run: flutter clean

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create artifact structure
        run: |
          mkdir -p release
          cp -r build/linux/x64/release/bundle release/flutter_vibe_helper
          cp assets/vibe-helper-icon.png release/flutter_vibe_helper/icon.png
          chmod +x release/flutter_vibe_helper/flutter_vibe_helper
          printf '[Desktop Entry]\nName=Flutter Vibe Helper\nExec=flutter_vibe_helper\nIcon=icon.png\nType=Application\nCategories=Utility;\nTerminal=false\n' > release/flutter_vibe_helper/flutter_vibe_helper.desktop
          printf '#!/bin/bash\nSCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"\nexec "$SCRIPT_DIR/flutter_vibe_helper" "$@"\n' > release/flutter_vibe_helper/run.sh
          chmod +x release/flutter_vibe_helper/run.sh
          tar -czvf flutter_vibe_helper-linux-x64.tar.gz -C release flutter_vibe_helper

      - name: Create deb package structure
        run: |
          mkdir -p flutter_vibe_helper-deb/usr/local/bin
          mkdir -p flutter_vibe_helper-deb/usr/share/applications
          mkdir -p flutter_vibe_helper-deb/usr/share/icons/hicolor/256x256/apps
          mkdir -p flutter_vibe_helper-deb/DEBIAN

      - name: Install files to deb
        run: |
          cp release/flutter_vibe_helper/flutter_vibe_helper flutter_vibe_helper-deb/usr/local/bin/
          cp release/flutter_vibe_helper/flutter_vibe_helper.desktop flutter_vibe_helper-deb/usr/share/applications/flutter-vibe-helper.desktop
          cp release/flutter_vibe_helper/icon.png flutter_vibe_helper-deb/usr/share/icons/hicolor/256x256/apps/flutter-vibe-helper.png
          chmod +x flutter_vibe_helper-deb/usr/local/bin/flutter_vibe_helper

      - name: Set version without v-prefix
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create control file
        run: |
          echo "Package: flutter-vibe-helper" > flutter_vibe_helper-deb/DEBIAN/control
          echo "Version: ${{ steps.version.outputs.VERSION }}" >> flutter_vibe_helper-deb/DEBIAN/control
          echo "Architecture: amd64" >> flutter_vibe_helper-deb/DEBIAN/control
          echo "Maintainer: Richard <you@example.com>" >> flutter_vibe_helper-deb/DEBIAN/control
          echo "Description: Dashboard for Mistral Vibe CLI analytics" >> flutter_vibe_helper-deb/DEBIAN/control
          echo "Depends: libgtk-3-0, libc6, libglib2.0-0, libstdc++6" >> flutter_vibe_helper-deb/DEBIAN/control

      - name: Build deb package
        run: dpkg-deb --build flutter_vibe_helper-deb flutter-vibe-helper-${{ steps.version.outputs.VERSION }}-amd64.deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-vibe-helper-deb
          path: flutter-vibe-helper-*.deb

      - name: Upload deb to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: flutter-vibe-helper-*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur-package:
    name: Generate AUR Package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake git libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build directory
        run: flutter clean

      - name: Build Linux release
        run: flutter build linux --release

      - name: Extract to release dir
        run: |
          mkdir -p release
          cp -r build/linux/x64/release/bundle release/flutter_vibe_helper
          cp assets/vibe-helper-icon.png release/flutter_vibe_helper/icon.png
          chmod +x release/flutter_vibe_helper/flutter_vibe_helper

      - name: Generate PKGBUILD
        run: |
          mkdir -p aur
          echo 'pkgname="flutter-vibe-helper"' > aur/PKGBUILD
          echo "pkgver='${GITHUB_REF_NAME}'" >> aur/PKGBUILD
          echo 'pkgrel=1' >> aur/PKGBUILD
          echo "pkgdesc='Dashboard for Mistral Vibe CLI analytics'" >> aur/PKGBUILD
          echo "arch=('x86_64')" >> aur/PKGBUILD
          echo "url='https://github.com/${GITHUB_REPOSITORY}'" >> aur/PKGBUILD
          echo "license=('MIT')" >> aur/PKGBUILD
          echo "depends=('gtk3' 'libxkbcommon' 'libglib-2.0' 'gcc-libs')" >> aur/PKGBUILD
          echo "makedepends=('base')" >> aur/PKGBUILD
          echo "source=('\$url/releases/download/v\$pkgver/flutter_vibe_helper-linux-x64.tar.gz')" >> aur/PKGBUILD
          echo "sha256sums=('SKIP')" >> aur/PKGBUILD
          echo '' >> aur/PKGBUILD
          echo 'build() {' >> aur/PKGBUILD
          echo '  tar -xzvf "${source}"' >> aur/PKGBUILD
          echo '}' >> aur/PKGBUILD
          echo '' >> aur/PKGBUILD
          echo 'package() {' >> aur/PKGBUILD
          echo '  mkdir -p "${pkgdir}/usr/bin"' >> aur/PKGBUILD
          echo '  mkdir -p "${pkgdir}/usr/share/applications"' >> aur/PKGBUILD
          echo '  mkdir -p "${pkgdir}/usr/share/icons/hicolor/256x256/apps"' >> aur/PKGBUILD
          echo '' >> aur/PKGBUILD
          echo '  install -Dm755 "flutter_vibe_helper/flutter_vibe_helper" "${pkgdir}/usr/bin/flutter-vibe-helper"' >> aur/PKGBUILD
          echo '  install -Dm644 "flutter_vibe_helper/flutter_vibe_helper.desktop" "${pkgdir}/usr/share/applications/flutter-vibe-helper.desktop"' >> aur/PKGBUILD
          echo '  install -Dm644 "flutter_vibe_helper/icon.png" "${pkgdir}/usr/share/icons/hicolor/256x256/apps/flutter-vibe-helper.png"' >> aur/PKGBUILD
          echo '}' >> aur/PKGBUILD

      - name: Upload PKGBUILD artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-vibe-helper-aur
          path: aur/

      - name: Upload PKGBUILD to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: aur/PKGBUILD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
