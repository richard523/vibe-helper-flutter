name: Build Linux

on:
  push:
    branches: [main, data-to-dashboard]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build directory
        run: flutter clean

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create artifact
        run: |
          mkdir -p release
          cp -r build/linux/x64/release/bundle/flutter_vibe_helper release/
          tar -czvf flutter_vibe_helper-linux-x64.tar.gz -C release flutter_vibe_helper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter_vibe_helper-linux-x64
          path: flutter_vibe_helper-linux-x64.tar.gz
          compression-level: 9

      - name: Upload release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: flutter_vibe_helper-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
