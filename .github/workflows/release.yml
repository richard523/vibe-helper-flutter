name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create tag
        id: tag
        run: echo "tag=release-${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Install VS Build Tools
        uses: microsoft/setup-msbuild@v1
      - run: flutter create --platforms windows .
      - run: flutter build windows
      - name: Zip Windows build
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../../../vibe-helper-windows.zip
      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: vibe-helper-windows.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang libgtk-3-dev libblkid-dev liblzma-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux
      - name: Zip Linux build
        run: tar -czf vibe-helper-linux.tar.gz -C build/linux/x64/release .
      - name: Upload Linux
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: vibe-helper-linux.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    needs: [create-release, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PKGBUILD
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          cat > PKGBUILD << EOF
          pkgname=vibe-helper-flutter-bin
          pkgver=${TAG#release-}
          pkgrel=1
          pkgdesc="Vibe Helper Flutter Application"
          arch=('x86_64')
          url="https://github.com/$REPO"
          license=('MIT')
          depends=('gtk3' 'libblkid.so' 'liblzma.so')
          source=("$SERVER/$REPO/releases/download/$TAG/vibe-helper-linux.tar.gz")
          
          package() {
            cd vibe-helper
            install -Dm755 * "$pkgdir/usr/bin/"
          }
          EOF
      - name: Upload PKGBUILD
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: PKGBUILD
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: [build-windows, build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
