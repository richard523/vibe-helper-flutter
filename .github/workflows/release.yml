name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create tag
        id: tag
        run: echo "tag=release-${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter build windows
      - name: Upload Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: build/windows/runner/Release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      filename: ${{ steps.filename.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang libgtk-3-dev libblkid-dev liblzma-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux
      - name: Get filename
        id: filename
        run: echo "name=$(ls build/linux/x64/release/ | head -1)" >> $GITHUB_OUTPUT
      - name: Upload Linux
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: build/linux/x64/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    needs: [create-release, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PKGBUILD
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          FILENAME: ${{ needs.build-linux.outputs.filename }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          cat > PKGBUILD << EOF
          # Maintainer: Your Name <your.email@example.com>
          pkgname=vibe-helper-flutter-bin
          pkgver=${TAG#release-}
          pkgrel=1
          pkgdesc="Vibe Helper Flutter Application"
          arch=('x86_64')
          url="https://github.com/$REPO"
          license=('MIT')
          depends=('gtk3' 'libblkid.so' 'liblzma.so')
          source=("$SERVER/$REPO/releases/download/$TAG/$FILENAME")
          
          build() {
            chmod +x "$FILENAME"
          }
          
          package() {
            install -Dm755 "$FILENAME" "$pkgdir/usr/bin/vibe-helper"
          }
          EOF
      - name: Upload PKGBUILD
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: PKGBUILD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
